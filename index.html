    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollToPlugin.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Flip.min.js"></script>

    <script src="script.js"></script>

    <script>
document.addEventListener("DOMContentLoaded", () => {
    const tl = gsap.timeline({ defaults: { ease: "power4.inOut" } });

    // 1. THE LOADER SEQUENCE (Centering Fix)
    tl.set(".loader-name", { 
        opacity: 0, 
        letterSpacing: "50px", 
        textIndent: "50px" // Matches letterspacing for perfect center
    })
    .to(".loader-name", {
        opacity: 1,
        letterSpacing: "10px",
        textIndent: "10px", // Animating this down keeps it centered
        duration: 2.5,
        ease: "expo.inOut"
    })
    .to(".loader", {
        yPercent: -100,
        duration: 1.4,
    }, "+=0.3")
    .to(".hero", {
        opacity: 1,
        duration: 0.8
    }, "-=1")
    .add(() => {
        document.querySelectorAll(".scramble").forEach(el => cinematicScramble(el));
    }, "-=0.5");

    // ... Rest of your Scramble and Slider code stays the same

    // 2. NAV HOVER ANIMATION (Letter Spacing Reveal)
    const navLinks = document.querySelectorAll(".navbar a");
    navLinks.forEach(link => {
        link.addEventListener("mouseenter", () => {
            gsap.to(link, { 
                letterSpacing: "4px", 
                duration: 0.6, 
                ease: "power2.out" 
            });
        });
        link.addEventListener("mouseleave", () => {
            gsap.to(link, { 
                letterSpacing: "0px", 
                duration: 0.6, 
                ease: "power2.inOut" 
            });
        });
    });

    // 3. CINEMATIC SCRAMBLE FUNCTION
    function cinematicScramble(element) {
        const originalText = element.innerText;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        let iteration = 0;
        
        // Clear initial text to prevent flash
        element.innerText = "";

        const interval = setInterval(() => {
            element.innerText = originalText
                .split("")
                .map((letter, index) => {
                    if (index < iteration) return originalText[index];
                    return chars[Math.floor(Math.random() * 26)];
                })
                .join("");

            if (iteration >= originalText.length) clearInterval(interval);
            iteration += 1 / 2; // Adjust speed here
        }, 40);
    }

    // 4. IMPROVED INFINITE LOOP SLIDER
    const setupSlider = () => {
        const track = document.querySelector(".slider-track");
        if (!track) return;

        // Reset any existing animation on resize
        gsap.killTweensOf(track);
        
        // Calculate width: track should contain two identical sets of images
        const totalWidth = track.scrollWidth;
        
        gsap.to(track, {
            x: -totalWidth / 2, // Only move the first set
            duration: 25,
            repeat: -1,
            ease: "none",
            onReverseComplete: () => {
                gsap.set(track, { x: 0 });
            }
        });
    };

    setupSlider();
    window.addEventListener("resize", setupSlider);
});


    </script>
</body>
